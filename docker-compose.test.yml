version: "3.8"
services:
  test-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: hms_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data

  e2e-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: e2e
      POSTGRES_PASSWORD: e2e
      POSTGRES_DB: hms_e2e
    ports:
      - "5434:5432"
    tmpfs:
      - /var/lib/postgresql/data
